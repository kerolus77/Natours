name: Push and Pull Request Workflow
on: 
    push:
       branches: 
            - main
    pull_request:
        branches:
            - main
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: checkout Repo
              uses: actions/checkout@v7.0.0
            - name: run test
              run: npm test
          
    
